# ============================================================
# Qwen3.6-35B-A3B 配置
# 用途: 单用户高质量编程，最大模型能力
# 特点: 大模型、长上下文、高质量 KV cache
# 并发: 1 个 Claude Code 最佳，2+ 并发性能极差
# ============================================================

# 模型
LLAMA_MODEL="unsloth/Qwen3.6-35B-A3B-GGUF:UD-IQ4_XS"

# 网络
LLAMA_PORT=8081
LLAMA_HOST=127.0.0.1

# 上下文（128K，Claude Code 需要）
LLAMA_CTX=131072

# Batch 设置
LLAMA_BATCH=2048
LLAMA_UBATCH=512
LLAMA_N_PREDICT=-1

# 线程
LLAMA_THREADS=8

# KV Cache 量化（Unsloth 推荐 q8_0，避免 f16）
LLAMA_KV_K=q8_0
LLAMA_KV_V=q8_0

# 采样参数（Qwen3.6 agentic coding 推荐）
LLAMA_TEMP=0.6
LLAMA_TOP_P=0.95
LLAMA_TOP_K=20
LLAMA_PRESENCE_PENALTY=0.0
LLAMA_MIN_P=0.0

# Thinking mode（false = 非思考模式，更适合 Claude Code）
LLAMA_THINKING=false

# 额外参数
LLAMA_EXTRA_ARGS="--jinja --flash-attn on --fit on"

# 配置元数据（脚本读取用）
CONFIG_NAME="Qwen3.6-35B-A3B (IQ4_XS)"
CONFIG_DESC="适合单用户高质量编程与仓库级软件工程，以35B MoE架构实现顶尖Agentic Coding能力"
CONFIG_MEMORY="~22GB 模型 + ~2GB KV cache"
