# ============================================================
# Qwen3.5-9B 配置 — 精确编码版
# 用途: 复杂算法/架构设计任务，追求精度
# 特点: 更高精度量化、更低 temperature
# 并发: 2 个 Claude Code（内存略增）
# ============================================================

# 模型（Q5_K_M，传统量化精度更好）
LLAMA_MODEL="unsloth/Qwen3.5-9B-GGUF:Q5_K_M"

# 网络
LLAMA_PORT=8081
LLAMA_HOST=127.0.0.1

# 上下文（64K）
LLAMA_CTX=65536

# Batch 设置
LLAMA_BATCH=2048
LLAMA_UBATCH=512
LLAMA_N_PREDICT=-1

# 线程
LLAMA_THREADS=8

# KV Cache 量化（高精度编码任务用 q8_0）
LLAMA_KV_K=q8_0
LLAMA_KV_V=q8_0

# 采样参数（精确编码推荐）
# 官方推荐: temp=0.6, top-p=0.95, presence_penalty=0.0
LLAMA_TEMP=0.6
LLAMA_TOP_P=0.95
LLAMA_TOP_K=20
LLAMA_PRESENCE_PENALTY=0.0
LLAMA_MIN_P=0.0

# Thinking mode（可尝试开启以获得更好推理）
# Qwen3.5 9B 默认关闭 thinking，如需开启用: true
LLAMA_THINKING=""

# 额外参数
LLAMA_EXTRA_ARGS="--jinja --flash-attn on --fit on"

# 配置元数据
CONFIG_NAME="Qwen3.5-9B (Q5_K_M) — 精确编码"
CONFIG_DESC="适合复杂算法设计与高精度编码任务，以更高量化精度换取推理可靠性"
CONFIG_MEMORY="~6.1GB 模型 + ~1GB KV cache"
