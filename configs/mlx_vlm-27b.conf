# ============================================================
# vllm-mlx + Qwen3.6-27B-OptiQ-4bit 配置
# 模型: mlx-community/Qwen3.6-27B-OptiQ-4bit
# 用途: 27B Dense，OptiQ 4bit + 内嵌 MTP head，KV cache 4-bit 量化
# 特点: SWE-bench 77.2%，MTP ~1.4x 加速
#       KV cache 4-bit 量化节省 ~50% 显存
#       chat_template 需修复（C++ Jinja 兼容）
# 参考:
#   vllm-mlx serve mlx-community/Qwen3.6-27B-OptiQ-4bit --port 8082 \
#     --tool-call-parser qwen3_coder_xml --no-thinking \
#     --kv-cache-quantization --kv-cache-quantization-bits 4 \
#     --enable-mtp --mtp-num-draft-tokens 2
# ============================================================

# 后端选择（vllm-mlx 支持 --tool-call-parser，mlx_vlm 不支持）
LLAMA_BACKEND=vllm-mlx

# 推理框架二进制
LLAMA_SERVER_BIN=vllm-mlx

# 模型（OptiQ 4bit + 内嵌 MTP head，~1.4x 加速）
LLAMA_MODEL="mlx-community/Qwen3.6-27B-OptiQ-4bit"

# 网络（独立端口，避免冲突）
LLAMA_PORT=8082
LLAMA_HOST=127.0.0.1

# 线程
LLAMA_THREADS=8

# 采样参数（Qwen3.6 官方 non-thinking coding 推荐）
# temp=0.7, top_p=0.8: 非推理场景官方推荐，平衡创造性和确定性
LLAMA_TEMP=0.7
LLAMA_TOP_P=0.8
LLAMA_TOP_K=20
LLAMA_PRESENCE_PENALTY=0.0
LLAMA_MIN_P=0.0

# Thinking mode（关闭 reasoning 以获得干净输出，提升指令遵循和格式正确性）
LLAMA_THINKING=false

# vllm-mlx 工具调用参数
# reasoning-parser 留空：对非推理场景，关闭 thinking 比解析 <think> 更可靠
RAPID_MLX_TOOL_PARSER="qwen3_coder_xml"
RAPID_MLX_REASONING_PARSER=""
RAPID_MLX_ENABLE_PREFIX_CACHE=true
RAPID_MLX_KV_QUANTIZATION=true
RAPID_MLX_KV_QUANT_BITS=4

# 额外启动参数
# KV 量化: 4-bit (通过 RAPID_MLX_KV_QUANTIZATION= true 启用)
# OptiQ 内嵌 MTP head → --enable-mtp ~1.4x 加速
# --mtp-num-draft-tokens 2: 每步预测 2 个 token
RAPID_MLX_EXTRA_ARGS="--continuous-batching --use-paged-cache --enable-mtp --mtp-num-draft-tokens 2"

# 代理并发控制（27B Dense，单并发）
PROXY_MAX_CONCURRENT=1

# 代理上下文管理
PROXY_CLEAR_ENABLED=true
PROXY_CLEAR_THRESHOLD=50000
PROXY_TOOL_KEEP=8
PROXY_CTX_LIMIT_ENABLED=true
PROXY_CTX_CHARS_LIMIT=120000
PROXY_CTX_KEEP_HEAD=6
PROXY_CTX_KEEP_TAIL=6

# Blocker 检测
PROXY_BLOCKER_ENABLED=true
PROXY_BLOCKER_THRESHOLD=2

# 上下文截断策略
PROXY_CTX_TRUNCATE_STRATEGY=rounds
PROXY_CTX_KEEP_ROUNDS=10

# 输出控制
PROXY_MAX_TOKENS_OVERRIDE=16384
PROXY_OUTPUT_TOKEN_LIMIT_RATIO=2.0
PROXY_BACKEND_TIMEOUT=300

# 循环检测
PROXY_LOOP_THRESHOLD=3

# 配置元数据
CONFIG_NAME="vllm-mlx + Qwen3.6-27B-OptiQ-4bit (MTP)"
CONFIG_DESC="27B Dense OptiQ 4bit，MTP 1.4x加速，KV 4bit量化，工具调用，no-thinking"
CONFIG_MEMORY="~12-16 GB (27B 4bit + 4bit KV cache + MTP head)"
