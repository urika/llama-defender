# ============================================================
# vllm-mlx + Qwen3.6-27B-OptiQ-4bit 配置
# 模型: mlx-community/Qwen3.6-27B-OptiQ-4bit
# 用途: 27B Dense，OptiQ 4bit + KV cache 4-bit 量化
# 特点: SWE-bench 77.2%，4-bit KV 量化，内存 ~21GB/36GB 安全
#       PagedCacheManager 已启用（块级缓存）
#       MemoryAwarePrefixCache 在当前 v0.6.71 的 BatchedEngine 下不可用
#       如需跨请求前缀缓存，需等待上游支持
#       参考: PID 92244 的旧引擎 session 缓存命中率 98-99%
# ============================================================

# ⚠️ 离线模式：网络不可用时跳过 HuggingFace Hub 连接检查
# vllm-mlx v0.6.71 启动时会尝试连接 huggingface.co 验证模型配置，
# 如果网络不可用会导致启动卡死（ConnectTimeout 重试循环）
export HF_HUB_OFFLINE=1

# 后端选择（vllm-mlx + BatchedEngine，v0.6.71）
# 注意: rapid-mlx 和 vllm-mlx 在 v0.6.71 中指向同一二进制，
#       BatchedEngine 是唯一可用的引擎
LLAMA_BACKEND=vllm-mlx

# 模型（OptiQ 4bit，Hybrid Dense，非 MoE，cache layer 可修剪）
LLAMA_MODEL="mlx-community/Qwen3.6-27B-OptiQ-4bit"

# 网络（独立端口，避免冲突）
LLAMA_PORT=8082
LLAMA_HOST=127.0.0.1

# 线程
LLAMA_THREADS=8

# 采样参数（Qwen3.6 官方 non-thinking coding 推荐）
# temp=0.7, top_p=0.8: 非推理场景官方推荐，平衡创造性和确定性
LLAMA_TEMP=0.7
LLAMA_TOP_P=0.8
LLAMA_TOP_K=20
LLAMA_PRESENCE_PENALTY=0.0
LLAMA_MIN_P=0.0

# Thinking mode（关闭 reasoning 以获得干净输出，提升指令遵循和格式正确性）
LLAMA_THINKING=false

# rapid-mlx 工具调用参数
# qwen3_coder_xml: 已验证在 rapid-mlx v0.6.71 下工作正常
# reasoning-parser 留空：非推理场景，关闭 thinking 比解析 <think> 更可靠
RAPID_MLX_TOOL_PARSER="qwen3_coder_xml"
RAPID_MLX_REASONING_PARSER=""
RAPID_MLX_ENABLE_PREFIX_CACHE=true
RAPID_MLX_KV_QUANTIZATION=true
RAPID_MLX_KV_QUANT_BITS=4

# 额外启动参数
# --use-paged-cache: 启用 PagedCacheManager（块级 KV 缓存管理，vllm-mlx BatchedEngine 默认）
# --gpu-memory-utilization 0.80: Metal 显存上限设为 80%
#     之前默认 90%（36.2GB），峰值已达 31.7GB（87.6%）逼近 kernel panic 阈值
#     降至 80%（32.2GB）后预留 ~3.5GB 安全余量，长期运行无 OOM 风险
#     参考资料: AGENTS.md 明确警告 >0.85 触发 kernel panic
RAPID_MLX_EXTRA_ARGS="--use-paged-cache --gpu-memory-utilization 0.80"

# 代理并发控制（27B Dense，单并发，避免 OOM）
PROXY_MAX_CONCURRENT=1

# 代理上下文管理
PROXY_CLEAR_ENABLED=false
PROXY_CLEAR_THRESHOLD=50000
PROXY_TOOL_KEEP=8
PROXY_CTX_LIMIT_ENABLED=true
PROXY_CTX_CHARS_LIMIT=120000
PROXY_CTX_KEEP_HEAD=6
PROXY_CTX_KEEP_TAIL=6

# Blocker 检测
PROXY_BLOCKER_ENABLED=true
PROXY_BLOCKER_THRESHOLD=2

# 上下文截断策略（rounds 按轮次保留，fifo 前缀更稳定）
# rapid-mlx 的 MemoryAwarePrefixCache 支持 LCP 前缀匹配，
# rounds 策略对 cache 命中率有影响，可尝试 fifo 获得更稳定的前缀
PROXY_CTX_TRUNCATE_STRATEGY=rounds
PROXY_CTX_KEEP_ROUNDS=10

# 输出控制
PROXY_MAX_TOKENS_OVERRIDE=16384
PROXY_OUTPUT_TOKEN_LIMIT_RATIO=2.0
PROXY_BACKEND_TIMEOUT=300

# 循环检测
PROXY_LOOP_THRESHOLD=3

# 配置元数据
CONFIG_NAME="vllm-mlx + Qwen3.6-27B-OptiQ-4bit (PagedCache)"
CONFIG_DESC="27B Dense，4-bit KV，Tool Clearing OFF，GPU利用率80%，Cache Aligner ON，动态max_tokens"
CONFIG_MEMORY="~12-16 GB (27B 4bit + 4bit KV cache + prefix cache 4GB)"
