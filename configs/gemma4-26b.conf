# ============================================================
# Rapid-MLX + Gemma 4 26B 4bit 配置
# 模型: mlx-community/gemma-4-26b-a4b-it-4bit
# 用途: 测试 4bit 量化版本的性能
# 特点: 26B Dense Transformer，4bit 量化，更小更快
# ============================================================

# 后端选择
LLAMA_BACKEND=rapid-mlx

# 模型
LLAMA_MODEL="mlx-community/gemma-4-26b-a4b-it-4bit"

# 网络
LLAMA_PORT=8081
LLAMA_HOST=127.0.0.1

# 线程
LLAMA_THREADS=8

# 采样参数
LLAMA_TEMP=0.6
LLAMA_TOP_P=0.95
LLAMA_TOP_K=20
LLAMA_PRESENCE_PENALTY=0.0
LLAMA_MIN_P=0.0

# Thinking mode
LLAMA_THINKING=false

# Rapid-MLX 特有参数
RAPID_MLX_TOOL_PARSER="gemma4"
RAPID_MLX_REASONING_PARSER="gemma4"
RAPID_MLX_ENABLE_PREFIX_CACHE=true
RAPID_MLX_KV_QUANTIZATION=true
RAPID_MLX_KV_QUANT_BITS=8

# GPU 内存限制（26B 模型，4bit 量化后更小）
# --max-num-seqs 1: 强制单序列，防止并发大上下文叠加导致 OOM
# --gpu-memory-utilization 0.55: 保守内存预算，为 KV cache 峰值留余量
RAPID_MLX_EXTRA_ARGS="--no-mllm --gpu-memory-utilization 0.55 --cache-memory-mb 4096 --max-num-seqs 1"

# 代理并发控制
PROXY_MAX_CONCURRENT=1

# 代理上下文清理配置
PROXY_CLEAR_ENABLED=false
PROXY_CLEAR_THRESHOLD=30000
PROXY_TOOL_KEEP=8
PROXY_CTX_LIMIT_ENABLED=true
PROXY_CTX_CHARS_LIMIT=80000
PROXY_CTX_KEEP_HEAD=6
PROXY_CTX_KEEP_TAIL=6

# Blocker 检测
PROXY_BLOCKER_ENABLED=true
PROXY_BLOCKER_THRESHOLD=2

# 上下文截断策略：rounds 保留完整对话轮
PROXY_CTX_TRUNCATE_STRATEGY=rounds
PROXY_CTX_KEEP_ROUNDS=10

# 输出控制
PROXY_MAX_TOKENS_OVERRIDE=8192
PROXY_OUTPUT_TOKEN_LIMIT_RATIO=2.0
PROXY_BACKEND_TIMEOUT=300

# 循环检测
PROXY_LOOP_THRESHOLD=3

# 配置元数据
CONFIG_NAME="Rapid-MLX + Gemma-4-26B"
CONFIG_DESC="Gemma 4 26B 4bit 量化版本"
CONFIG_MEMORY="~14 GB (模型 + 8bit KV cache)"
