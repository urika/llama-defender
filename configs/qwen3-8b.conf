export HF_HUB_OFFLINE=1
LLAMA_BACKEND=rapid-mlx
LLAMA_MODEL="mlx-community/Qwen3-8B-4bit"
LLAMA_PORT=8081
LLAMA_HOST=127.0.0.1
LLAMA_THREADS=8
LLAMA_TEMP=0.6
LLAMA_TOP_P=0.95
LLAMA_TOP_K=20
LLAMA_THINKING=false
RAPID_MLX_TOOL_PARSER="qwen3_coder"
RAPID_MLX_REASONING_PARSER="qwen3"
RAPID_MLX_ENABLE_PREFIX_CACHE=true
RAPID_MLX_KV_QUANTIZATION=false
RAPID_MLX_EXTRA_ARGS="--no-mllm --gpu-memory-utilization 0.40 --cache-memory-mb 1024 --max-num-seqs 4"
PROXY_MAX_CONCURRENT=4
PROXY_CLEAR_ENABLED=false
PROXY_TOOL_KEEP=8
PROXY_CTX_LIMIT_ENABLED=true
PROXY_CTX_CHARS_LIMIT=80000
PROXY_CTX_TRUNCATE_STRATEGY=fifo
PROXY_MAX_TOKENS_OVERRIDE=32768
PROXY_BACKEND_TIMEOUT=600
CONFIG_NAME="vllm-mlx + Qwen3-8B"
CONFIG_DESC="Qwen3-8B，最小模型，并发4，测试用"
CONFIG_MEMORY="~4-5 GB"

# 请求体大小硬上限（默认 500KB，超过返回 413）
PROXY_MAX_REQUEST_BYTES=512000
