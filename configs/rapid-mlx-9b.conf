# ============================================================
# Rapid-MLX + Qwen3.5-9B-MLX-4bit 配置
# 用途: 单用户编程，内存优化版本
# 特点: 比 35B 模型省 15GB 内存，速度更快
# ============================================================

# 后端选择
LLAMA_BACKEND=rapid-mlx

# 模型
LLAMA_MODEL="/Users/jinsongwang/models/Qwen3.5-9B-MLX-4bit"

# 网络
LLAMA_PORT=8081
LLAMA_HOST=127.0.0.1

# 线程
LLAMA_THREADS=8

# 采样参数
LLAMA_TEMP=0.6
LLAMA_TOP_P=0.95
LLAMA_TOP_K=20
LLAMA_PRESENCE_PENALTY=0.0
LLAMA_MIN_P=0.0

# Thinking mode
LLAMA_THINKING=false

# Rapid-MLX 特有参数
RAPID_MLX_TOOL_PARSER="qwen3_coder_xml"
RAPID_MLX_REASONING_PARSER="qwen3"
RAPID_MLX_ENABLE_PREFIX_CACHE=true
RAPID_MLX_KV_QUANTIZATION=true
RAPID_MLX_KV_QUANT_BITS=8

# GPU 内存限制（9B 模型内存压力小，可以放宽）
RAPID_MLX_EXTRA_ARGS="--no-mllm --gpu-memory-utilization 0.50 --cache-memory-percent 0.10 --cache-memory-mb 2048 --max-num-seqs 1"

# 代理并发控制
PROXY_MAX_CONCURRENT=1

# 代理上下文清理配置（9B 模型上下文压力小，可以保留更多历史）
PROXY_CLEAR_ENABLED=true
PROXY_CLEAR_THRESHOLD=20000
PROXY_TOOL_KEEP=5
PROXY_CTX_LIMIT_ENABLED=true
PROXY_CTX_CHARS_LIMIT=100000
PROXY_CTX_KEEP_HEAD=2
PROXY_CTX_KEEP_TAIL=6

# 上下文截断策略
PROXY_CTX_TRUNCATE_STRATEGY=rounds
PROXY_CTX_KEEP_ROUNDS=4
PROXY_CTX_TOKEN_BUDGET=15000

# 配置元数据
CONFIG_NAME="Rapid-MLX + Qwen3.5-9B-MLX-4bit"
CONFIG_DESC="适合Apple Silicon上的单用户编程，内存优化版本，比35B省15GB内存"
CONFIG_MEMORY="~6-8 GB (模型 + 8-bit KV cache)"
