# ============================================================
# Rapid-MLX + Qwen3.5-9B-MLX-4bit 配置
# 用途: 单用户编程，内存优化版本
# 特点: 比 35B 模型省 15GB 内存，速度更快
# ============================================================

# 后端选择
LLAMA_BACKEND=rapid-mlx

# 模型
LLAMA_MODEL="/Users/jinsongwang/models/Qwen3.5-9B-MLX-4bit"

# 网络
LLAMA_PORT=8081
LLAMA_HOST=127.0.0.1

# 线程
LLAMA_THREADS=8

# 采样参数
LLAMA_TEMP=0.6
LLAMA_TOP_P=0.95
LLAMA_TOP_K=20
LLAMA_PRESENCE_PENALTY=0.0
LLAMA_MIN_P=0.0

# Thinking mode
LLAMA_THINKING=false

# Rapid-MLX 特有参数
RAPID_MLX_TOOL_PARSER="qwen3_coder_xml"
RAPID_MLX_REASONING_PARSER="qwen3"
RAPID_MLX_ENABLE_PREFIX_CACHE=true
RAPID_MLX_KV_QUANTIZATION=true
RAPID_MLX_KV_QUANT_BITS=8

# GPU 内存限制（9B 模型内存压力小，可以放宽）
RAPID_MLX_EXTRA_ARGS="--no-mllm --gpu-memory-utilization 0.50 --cache-memory-percent 0.10 --cache-memory-mb 4096 --max-num-seqs 1"

# 代理并发控制
# 2026-06-04: 曾尝试提升到 2，但 running=2 时内存 peak 达 26.7GB，
# 频繁触发 forced cache clear（44次/1.5h），生成速度下降 50%+。
# 回滚到 1，风险收益比更优。
PROXY_MAX_CONCURRENT=1

# 代理上下文清理配置（9B 模型上下文压力小，可以保留更多历史）
PROXY_CLEAR_ENABLED=true
PROXY_CLEAR_THRESHOLD=20000
PROXY_TOOL_KEEP=10
PROXY_CTX_LIMIT_ENABLED=true
PROXY_CTX_CHARS_LIMIT=100000
PROXY_CTX_KEEP_HEAD=2
PROXY_CTX_KEEP_TAIL=6

# 上下文截断策略
PROXY_CTX_TRUNCATE_STRATEGY=rounds
PROXY_CTX_KEEP_ROUNDS=10
PROXY_CTX_TOKEN_BUDGET=40000

# 输出 token 限制
# 2026-06-04: 4096 导致 Write tool_call 参数被截断（JSON 残缺）
# 改为 16384，配合 FORCE_STOPPED 的 2.0x 比例 = 32768 token 硬上限
PROXY_MAX_TOKENS_OVERRIDE=16384
PROXY_OUTPUT_TOKEN_LIMIT_RATIO=2.0
PROXY_BACKEND_TIMEOUT=300

# 请求报文保存（调试用）
PROXY_SAVE_REQUESTS=true
PROXY_SAVE_REQUESTS_DIR=/tmp/anthropic_requests
PROXY_SAVE_REQUESTS_MAX=20

# 配置元数据
CONFIG_NAME="Rapid-MLX + Qwen3.5-9B-MLX-4bit"
CONFIG_DESC="适合Apple Silicon上的单用户编程，内存优化版本，比35B省15GB内存"
CONFIG_MEMORY="~6-8 GB (模型 + 8-bit KV cache)"
