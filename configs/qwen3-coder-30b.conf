# ============================================================
# vllm-mlx + Qwen3-Coder-30B-A3B-4bit 配置
# 模型: mlx-community/Qwen3-Coder-30B-A3B-Instruct-4bit
# 用途: 代码生成与工具调用，MoE 架构 (30B 总参, 3B 激活)
# 特点: 非 reasoning 模型，无思考链开销，TTFT 极快 (~0.05s)
#       MoE 仅 3B 激活参数，吞吐高于 Qwen3-8B (~87 vs 53 tok/s)
#       Continuous batching 几乎线性扩展 (6并发=5.7x)
# 参考启动命令:
#   vllm-mlx serve mlx-community/Qwen3-Coder-30B-A3B-Instruct-4bit \
#     --port 8081 --continuous-batching --use-paged-cache
# 注意: chat_template 需要修复（<think> token 导致 vllm-mlx EOS bug）
#       运行: ./manage.sh fix-template <model_cache_dir>
# ============================================================

# 后端选择
LLAMA_BACKEND=vllm-mlx

# 推理框架二进制（vllm-mlx 而非 rapid-mlx）
LLAMA_SERVER_BIN=vllm-mlx

# 模型
LLAMA_MODEL="mlx-community/Qwen3-Coder-30B-A3B-Instruct-4bit"

# 网络（匹配实际运行端口）
LLAMA_PORT=8081
LLAMA_HOST=127.0.0.1

# 线程
LLAMA_THREADS=8

# 采样参数（v2 优化：编程场景优化）
# TEMP 0.6→0.5: 降低随机性但不失多样性，减少 markdown 包装
# TOP_P 0.95→0.9: 缩小采样范围，减少低概率噪声
# MIN_P 0.0→0.02: 过滤概率<2%的token，提升格式一致性
LLAMA_TEMP=0.5
LLAMA_TOP_P=0.9
LLAMA_TOP_K=20
LLAMA_PRESENCE_PENALTY=0.0
LLAMA_MIN_P=0.02

# Thinking mode（Coder 模型非 reasoning，关闭 thinking）
LLAMA_THINKING=false

# Rapid-MLX 特有参数
# qwen3_coder_xml: 解析 <tool_call> XML 格式的工具调用
# 不使用 --reasoning-parser（Coder 不是 reasoning 模型，去掉避免 EOS bug）
RAPID_MLX_TOOL_PARSER="qwen3_coder_xml"
RAPID_MLX_REASONING_PARSER=""
RAPID_MLX_ENABLE_PREFIX_CACHE=true
RAPID_MLX_KV_QUANTIZATION=false

# 额外启动参数（匹配实际运行命令）
RAPID_MLX_EXTRA_ARGS="--continuous-batching --use-paged-cache"

# 代理并发控制
# Coder 模型并发扩展优秀（6并发=5.7x），设为 4 兼顾延迟和吞吐
PROXY_MAX_CONCURRENT=4

# 代理上下文管理（v2 优化：防止长对话质量退化）
# CLEAR_ENABLED false→true: 对话超过阈值时清理旧消息，防止模型在过长上下文中迷失
# CTX_LIMIT false→true: 启用字符数截断，长上下文时主动裁剪
# CHARS_LIMIT 200000→120000: 更早截断，30B MoE 在 120K chars 内质量最佳
# TRUNCATE_STRATEGY fifo→rounds: 按对话轮次保留（而非纯消息数），保持语义连贯
PROXY_CLEAR_ENABLED=true
PROXY_CLEAR_THRESHOLD=50000
PROXY_TOOL_KEEP=8
PROXY_CTX_LIMIT_ENABLED=true
PROXY_CTX_CHARS_LIMIT=120000
PROXY_CTX_KEEP_HEAD=6
PROXY_CTX_KEEP_TAIL=6

# Blocker 检测
PROXY_BLOCKER_ENABLED=true
PROXY_BLOCKER_THRESHOLD=2

# 上下文截断策略：rounds 保留完整对话轮，比 fifo 更利于多轮连贯
PROXY_CTX_TRUNCATE_STRATEGY=rounds
PROXY_CTX_KEEP_ROUNDS=12

# 输出控制
PROXY_MAX_TOKENS_OVERRIDE=16384
PROXY_OUTPUT_TOKEN_LIMIT_RATIO=2.0
PROXY_BACKEND_TIMEOUT=300

# 循环检测
PROXY_LOOP_THRESHOLD=3

# 配置元数据
CONFIG_NAME="vllm-mlx + Qwen3-Coder-30B-A3B-4bit"
CONFIG_DESC="Coder模型，MoE 30B(3B激活)，代码生成+工具调用，非reasoning低延迟，vllm-mlx启动"
CONFIG_MEMORY="~12-16 GB (模型 8.7GB + KV cache)"
