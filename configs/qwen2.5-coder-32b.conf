# ============================================================
# Qwen2.5-Coder-32B-Instruct 配置
# 用途: 单用户专业编码，代码生成、补全、修复
# 特点: 32B Dense 模型、32K 上下文、Q4_K_M 量化
# 并发: 1 个 Claude Code 最佳（Dense 模型 GPU 资源占用高）
# ============================================================

# 后端
LLAMA_BACKEND=llama-server

# 模型（HuggingFace Q4_K_M GGUF）
LLAMA_MODEL="Qwen/Qwen2.5-Coder-32B-Instruct-GGUF:Q4_K_M"

# 网络
LLAMA_PORT=8081
LLAMA_HOST=127.0.0.1

# 上下文（32K，Qwen2.5-Coder 原生上下文长度）
LLAMA_CTX=32768

# Batch 设置
LLAMA_BATCH=2048
LLAMA_UBATCH=512
LLAMA_N_PREDICT=-1

# 线程
LLAMA_THREADS=8

# KV Cache 量化（q8_0 兼顾精度与内存占用）
LLAMA_KV_K=q8_0
LLAMA_KV_V=q8_0

# 采样参数（Qwen2.5-Coder 官方推荐：编码任务用 temp=0.7）
LLAMA_TEMP=0.7
LLAMA_TOP_P=0.8
LLAMA_TOP_K=20
LLAMA_PRESENCE_PENALTY=1.5
LLAMA_MIN_P=0.0

# Thinking mode（Qwen2.5 系列不支持 thinking，留空跳过）
LLAMA_THINKING=""

# 额外参数（--jinja 让 llama-server 使用 GGUF 内置 Qwen2.5 模板）
LLAMA_EXTRA_ARGS="--jinja --flash-attn on --fit on"

# 配置元数据
CONFIG_NAME="Qwen2.5-Coder-32B-Instruct (Q4_K_M)"
CONFIG_DESC="适合单用户专业编码与代码补全任务，以32B Dense架构在编码 benchmark 上对标 GPT-4o"
CONFIG_MEMORY="~20GB 模型 + ~1.5GB KV cache (32K)"
