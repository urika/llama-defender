# ============================================================
# Rapid-MLX + Qwen3.6-35B-A3B-4bit 配置
# 用途: 单用户高质量编程，MLX 框架优化版本
# 特点: 比 llama.cpp 快 36%，内存省 5GB
# 启用: 4-bit KV cache 量化 (PolarQuant) + 强制启用推测解码
# ============================================================

# 后端选择
LLAMA_BACKEND=rapid-mlx

# 模型
LLAMA_MODEL="mlx-community/Qwen3.6-35B-A3B-4bit"

# 网络
LLAMA_PORT=8081
LLAMA_HOST=127.0.0.1

# 线程
LLAMA_THREADS=8

# 采样参数
LLAMA_TEMP=0.6
LLAMA_TOP_P=0.95
LLAMA_TOP_K=20
LLAMA_PRESENCE_PENALTY=0.0
LLAMA_MIN_P=0.0

# Thinking mode
LLAMA_THINKING=false
PRESERVE_THINKING=true

# Rapid-MLX 特有参数
RAPID_MLX_TOOL_PARSER="qwen3_coder_xml"
RAPID_MLX_REASONING_PARSER="qwen3"
RAPID_MLX_ENABLE_PREFIX_CACHE=true
RAPID_MLX_KV_QUANTIZATION=true
RAPID_MLX_KV_QUANT_BITS=4

# GPU 内存限制（35B 模型，参考 9B 配置优化）
# --pin-system-prompt: 固定 system prompt 在 KV cache 中，避免前缀缓存失效
# --max-num-seqs 1: 单请求独占，防止并发 OOM
# 注意: --kv-cache-turboquant 会导致 prefix cache 持久化失效（TurboQuantKVCache 无 state 属性）
#       因此移除 turboquant，改用标准 FP16 KV cache。84K tokens 约需 3.8GB，当前可用 14GB。
RAPID_MLX_EXTRA_ARGS="--no-mllm --gpu-memory-utilization 0.75 --cache-memory-mb 4096 --max-num-seqs 1 --no-hybrid --force-spec-decode"

# 代理并发控制
# 48GB 统一内存下，两个大上下文请求并发会导致 OOM 崩溃。
# 设为 1 确保单请求独占 GPU，避免 prefill 阶段内存叠加。
PROXY_MAX_CONCURRENT=1

# 代理上下文清理配置（C组激进参数 v3）
# 目标：将每轮 prompt 控制在 30K-60K tokens 以内，减少长上下文延迟。
PROXY_CLEAR_ENABLED=false
PROXY_CLEAR_THRESHOLD=30000
PROXY_TOOL_KEEP=8
PROXY_CTX_LIMIT_ENABLED=true
PROXY_CTX_CHARS_LIMIT=150000
# Plan 2D (prefix-cache, aggressive head): keep 6 messages in the head =
# first ~3 turns (system + task + TodoWrite + first Read + first Read result).
# Adds the first file content to the stable prefix.
# Trade-off: if the first file is later re-read with different content, the
# head becomes stale. In typical Claude Code usage, the first Read targets
# a stable file (CLAUDE.md, README, or project entry), so risk is low.
# Net: 7 stable messages / 30 total = 23% prefill savings (was 17% with HEAD=4).
PROXY_CTX_KEEP_HEAD=6
PROXY_CTX_KEEP_TAIL=6

# Blocker 检测：连续 2 次同类 tool_result 错误（file_not_found/wasted/input_validation）
# 触发时在 tail 注入 [BLOCKER] 消息，避免 agent 反复重试相同失败操作。
PROXY_BLOCKER_ENABLED=true
PROXY_BLOCKER_THRESHOLD=2

# 上下文截断策略：
# rounds = 按对话轮数 + token 预算保留（主动控制，动态调整，优先保留近期交互）
# fifo   = 按固定消息数保留（head + 最近 N 条），窗口滑动更稳定，利于 prefix cache 命中
# char   = 按字符阈值截断（原有逻辑，被动触发）
# 生产环境优先 rounds 以获得更智能的上下文管理
PROXY_CTX_TRUNCATE_STRATEGY=fifo
# fifo 策略：固定头 + 滑动窗口，头部稳定利于 prefix cache 命中
# rounds 策略：按轮次截断，每次截断边界不同导致 prompt token 序列变化，cache miss
# 30 messages (down from 40) — smaller window reduces prefill cost
PROXY_CTX_KEEP_MESSAGES=30

# 输出控制（防 rapid-mlx 忽略 max_tokens）
PROXY_MAX_TOKENS_OVERRIDE=16384
PROXY_OUTPUT_TOKEN_LIMIT_RATIO=2.0
PROXY_BACKEND_TIMEOUT=300

# 循环检测
PROXY_LOOP_THRESHOLD=3

# 配置元数据
CONFIG_NAME="Rapid-MLX + Qwen3.6-35B-A3B-4bit (4-bit KV, spec-decode)"
CONFIG_DESC="适合Apple Silicon上的单用户高质量编程。启用4-bit KV缓存量化+强制推测解码。"
CONFIG_MEMORY="~14-18 GB (模型 + 4-bit KV cache)"
