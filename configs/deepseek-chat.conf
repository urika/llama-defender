# DeepSeek Cloud API 配置（真实环境）
# 用户提供的 Anthropic 兼容配置:
#   ANTHROPIC_BASE_URL: https://api.deepseek.com/anthropic
#   ANTHROPIC_MODEL: deepseek-v4-pro[1m]
#   ANTHROPIC_DEFAULT_SONNET_MODEL: deepseek-v4-pro[1m]
#   ANTHROPIC_DEFAULT_HAIKU_MODEL: deepseek-v4-flash
#
# 代理中转使用 OpenAI 兼容端点 (/v1)，模型映射关系:
#   Anthropic deepseek-v4-pro[1m]  →  OpenAI deepseek-v4-pro
#   Anthropic deepseek-v4-flash    →  OpenAI deepseek-v4-flash
#   Anthropic deepseek-chat        →  OpenAI deepseek-v4-pro (非思考模式)
#   Anthropic deepseek-reasoner    →  OpenAI deepseek-v4-pro (思考模式)
#
# 注意: deepseek-chat 和 deepseek-reasoner 将于 2026/07/24 弃用
#       详见 https://api-docs.deepseek.com/zh-cn/

LLAMA_BACKEND=deepseek-cloud
LLAMA_BASE_URL=https://api.deepseek.com/v1

# API Key: loaded by manage.sh from configs/secret.local.conf at startup
# (git-ignored). Create that file with: LLAMA_API_KEY="sk-your-key"
# The key is then available for hot-switch via `./manage.sh reload`.

# 模型名称（OpenAI 兼容端点）
# deepseek-v4-pro:  完整模型（对应 Anthropic deepseek-v4-pro[1m]）
# deepseek-v4-flash: 轻量模型（对应 Anthropic deepseek-v4-flash）
MODEL_NAME=deepseek-v4-flash

# Cloud API 支持更高并发
PROXY_MAX_CONCURRENT=4

# 代理上下文管理（云模式默认值由代理自动设置，通常无需覆盖）
# Cloud 后端: clearing 默认关闭（DeepSeek 支持 1M tokens），Local 后端: 默认开启
# 如需覆盖，取消注释以下行:
# PROXY_CLEAR_ENABLED=false
# PROXY_CLEAR_THRESHOLD=30000
# PROXY_TOOL_KEEP=10
PROXY_CONTENT_TOOLS_FALLBACK=true

# Context limit truncation（云模式默认关闭，Local 默认开启）
# PROXY_CTX_LIMIT_ENABLED=false
# PROXY_CTX_CHARS_LIMIT=500000

# 状态页和日志
PROXY_LOG_PATH=/tmp/anthropic_proxy.log

# 元数据
CONFIG_NAME="deepseek-chat (flash)"
CONFIG_DESC="DeepSeek Chat API via 代理中转（flash 轻量版本）"
CONFIG_MEMORY="按需付费，无本地内存限制"

# 请求体大小硬上限（默认 500KB，超过返回 413）
PROXY_MAX_REQUEST_BYTES=512000
