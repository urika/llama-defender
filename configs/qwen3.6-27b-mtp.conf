# ============================================================
# Qwen3.6-27B MTP 配置
# 用途: MTP 投机解码测评，Dense 27B 模型
# 特点: MTP 加速约 1.4x，比 MoE 更显著
# ============================================================

LLAMA_BACKEND=llama-server

# 模型 (MTP 专用 GGUF)
LLAMA_MODEL="unsloth/Qwen3.6-27B-MTP-GGUF:UD-Q4_K_XL"

# 网络
LLAMA_PORT=8081
LLAMA_HOST=127.0.0.1

# 上下文
LLAMA_CTX=131072

# Batch 设置
LLAMA_BATCH=2048
LLAMA_UBATCH=512
LLAMA_N_PREDICT=-1

# 线程
LLAMA_THREADS=8

# KV Cache 量化
LLAMA_KV_K=q8_0
LLAMA_KV_V=q8_0

# 采样参数
LLAMA_TEMP=0.6
LLAMA_TOP_P=0.95
LLAMA_TOP_K=20
LLAMA_PRESENCE_PENALTY=0.0
LLAMA_MIN_P=0.0

# Thinking mode
LLAMA_THINKING=false

# 修复后的 Qwen chat template（解决 System message must be at the beginning 错误）
LLAMA_CHAT_TEMPLATE="/Users/jinsongwang/APP/llama.cpp/assets/chat-templates/qwen-fixed-chat-template.jinja"

# MTP 投机解码
LLAMA_EXTRA_ARGS="--jinja --flash-attn on --fit on --spec-type draft-mtp --spec-draft-n-max 2"

# 代理并发控制
# llama-server 在 Metal 单 GPU 上并发性能差，保持 1
PROXY_MAX_CONCURRENT=1

# 配置元数据
CONFIG_NAME="Qwen3.6-27B MTP (UD-Q4_K_XL)"
CONFIG_DESC="MTP Dense 27B 模型，适合高精度编程与推理，MTP 加速约 1.4-2.2x"
CONFIG_MEMORY="~19-20 GB (模型 ~19GB + KV cache + MTP overhead)"
