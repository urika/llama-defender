# ============================================================
# Qwen3.5-9B 配置 — 通用平衡版
# 用途: 2-3 个 Claude Code 并发编程
# 特点: 小模型、中等上下文、内存占用低
# 并发: 2-3 个 Claude Code 体验良好
# ============================================================

# 模型（Unsloth Dynamic 4bit XL，精度最佳）
LLAMA_MODEL="/Users/jinsongwang/.cache/llama.cpp/models/Qwen3.5-9B-UD-Q4_K_XL.gguf"

# 网络
LLAMA_PORT=8081
LLAMA_HOST=127.0.0.1

# 上下文（64K，足够日常编程）
LLAMA_CTX=65536

# Batch 设置
LLAMA_BATCH=2048
LLAMA_UBATCH=512
LLAMA_N_PREDICT=-1

# 线程
LLAMA_THREADS=8

# KV Cache 量化
LLAMA_KV_K=q8_0
LLAMA_KV_V=q8_0

# 采样参数（Qwen3.5 Instruct 通用推荐）
LLAMA_TEMP=0.7
LLAMA_TOP_P=0.8
LLAMA_TOP_K=20
LLAMA_PRESENCE_PENALTY=1.5
LLAMA_MIN_P=0.0

# Qwen3.5 Small 默认关闭 thinking，不需要显式设置
LLAMA_THINKING=""

# 额外参数
LLAMA_EXTRA_ARGS="--jinja --flash-attn on --fit on"

# 配置元数据
CONFIG_NAME="Qwen3.5-9B (UD-Q4_K_XL)"
CONFIG_DESC="适合2-3并发Claude Code的中等规模本地编程，兼顾工具调用可靠性与低内存占用"
CONFIG_MEMORY="~5.6GB 模型 + ~1GB KV cache"
