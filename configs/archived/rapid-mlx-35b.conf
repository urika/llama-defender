# ============================================================
# vllm-mlx + Qwen3.6-35B-A3B-4bit 配置
# 用途: 单用户高质量编程
# 特点: MoE 35B(3B激活)，4-bit KV cache，推测解码
# 注意: MoE 架构 non-trimmable → 跨请求前缀缓存 0%
#       (旧版 MemoryAwarePrefixCache 可用，v0.6.71 BatchedEngine 不可用)
# ============================================================

# ⚠️ 离线模式：v0.6.71 启动必连 huggingface.co，网络不可用则卡死
export HF_HUB_OFFLINE=1

# 后端选择（v0.6.71 中与 vllm-mlx 同一二进制）
LLAMA_BACKEND=rapid-mlx

# 模型
LLAMA_MODEL="mlx-community/Qwen3.6-35B-A3B-4bit"

# 网络
LLAMA_PORT=8081
LLAMA_HOST=127.0.0.1

# 线程
LLAMA_THREADS=8

# 采样参数
LLAMA_TEMP=0.6
LLAMA_TOP_P=0.95
LLAMA_TOP_K=20
LLAMA_PRESENCE_PENALTY=0.0
LLAMA_MIN_P=0.0

# Thinking mode
LLAMA_THINKING=false

# Rapid-MLX 特有参数
RAPID_MLX_TOOL_PARSER="qwen3_coder_xml"
RAPID_MLX_REASONING_PARSER="qwen3"
RAPID_MLX_ENABLE_PREFIX_CACHE=true
RAPID_MLX_KV_QUANTIZATION=true
RAPID_MLX_KV_QUANT_BITS=4

# GPU 内存限制（35B MoE 模型 OOM 边界窄）
# --gpu-memory-utilization 0.65: 35B MoE 峰值可达 33-39GB(YJ 旧版已验证高利用率)，
#   0.65=26GB 上限预留充足余量，防止 kernel panic
# --no-mllm: 纯文本模型
# --cache-memory-mb 4096: 前缀缓存 4GB
# --max-num-seqs 1: 单请求防 OOM
# --no-hybrid: 35B MoE 禁用 hybrid 模式（已有 GatedDeltaNet 处理）
# --force-spec-decode: 启用内部推测解码
RAPID_MLX_EXTRA_ARGS="--no-mllm --gpu-memory-utilization 0.65 --cache-memory-mb 4096 --max-num-seqs 1 --no-hybrid --force-spec-decode"

# 代理并发控制（48GB 下双并发必定 OOM）
PROXY_MAX_CONCURRENT=1

# 代理上下文管理
PROXY_CLEAR_ENABLED=false
PROXY_CLEAR_THRESHOLD=30000
PROXY_TOOL_KEEP=8
PROXY_CTX_LIMIT_ENABLED=true
PROXY_CTX_CHARS_LIMIT=150000
PROXY_CTX_KEEP_HEAD=6
PROXY_CTX_KEEP_TAIL=6

# Blocker 检测
PROXY_BLOCKER_ENABLED=true
PROXY_BLOCKER_THRESHOLD=2

# 上下文截断策略
# fifo: 固定头 + 滑动窗口，头部稳定利于未来 prefix cache
PROXY_CTX_TRUNCATE_STRATEGY=fifo
PROXY_CTX_KEEP_MESSAGES=30

# 输出控制
PROXY_MAX_TOKENS_OVERRIDE=16384
PROXY_OUTPUT_TOKEN_LIMIT_RATIO=2.0
PROXY_BACKEND_TIMEOUT=300

# 循环检测
PROXY_LOOP_THRESHOLD=3

# 配置元数据
CONFIG_NAME="vllm-mlx + Qwen3.6-35B-A3B-4bit"
CONFIG_DESC="35B MoE，4-bit KV，GPU利用率65%，推测解码，Tool Clearing OFF，HF_HUB_OFFLINE"
CONFIG_MEMORY="~14-18 GB"
