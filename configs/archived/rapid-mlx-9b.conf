# ============================================================
# vllm-mlx + Qwen3.5-9B-MLX-4bit 配置
# 用途: 轻量编程，低内存占用
# 特点: 9B dense 架构，理论上最佳跨请求前缀缓存效果
#       实测仅 6-8GB，适合内存紧张或快速迭代场景
# ============================================================

# ⚠️ 离线模式：v0.6.71 启动必连 huggingface.co，网络不可用则卡死
export HF_HUB_OFFLINE=1

# 后端选择（rapid-mlx，v0.6.71 中与 vllm-mlx 同一二进制）
LLAMA_BACKEND=rapid-mlx

# 模型（本地路径）
LLAMA_MODEL="/Users/jinsongwang/models/Qwen3.5-9B-MLX-4bit"

# 网络
LLAMA_PORT=8081
LLAMA_HOST=127.0.0.1

# 线程
LLAMA_THREADS=8

# 采样参数
LLAMA_TEMP=0.6
LLAMA_TOP_P=0.95
LLAMA_TOP_K=20
LLAMA_PRESENCE_PENALTY=0.0
LLAMA_MIN_P=0.0

# Thinking mode
LLAMA_THINKING=false

# Rapid-MLX 特有参数
RAPID_MLX_TOOL_PARSER="qwen3_coder_xml"
RAPID_MLX_REASONING_PARSER="qwen3"
RAPID_MLX_ENABLE_PREFIX_CACHE=true

# 9B dense 模型内存充裕，不启用 KV 量化（FP16 精度最高）
# 如发现 TTFT 过高可启用量化: RAPID_MLX_KV_QUANTIZATION=true, BITS=8
RAPID_MLX_KV_QUANTIZATION=false
RAPID_MLX_KV_QUANT_BITS=8

# 额外启动参数
# --no-mllm: 纯文本模型，关闭多模态支持
# --gpu-memory-utilization 0.65: 9B 模型仅 6-8GB，0.65=26GB 上限，安全且够用
# --cache-memory-mb 2048: 前缀缓存 2GB（9B 模型无需 8GB）
# --max-num-seqs 1: 单请求
# --pin-system-prompt: 固定 system prompt 以提高前缀稳定性
# 注意: 不使用 --kv-cache-turboquant（AGENTS.md 明确警告破坏 cache persist）
RAPID_MLX_EXTRA_ARGS="--no-mllm --gpu-memory-utilization 0.65 --cache-memory-mb 2048 --max-num-seqs 1 --pin-system-prompt"

# 代理并发控制
# 2026-06-04: 曾尝试提升到 2，但 running=2 时内存 peak 达 26.7GB
PROXY_MAX_CONCURRENT=1

# 代理上下文管理
# CLEAR_ENABLED=false: Tool Clearing 已废弃（AGENTS.md 警告），
#   由 Smart Truncate + 语义压缩替代
PROXY_CLEAR_ENABLED=false
PROXY_CLEAR_THRESHOLD=20000
PROXY_TOOL_KEEP=10
PROXY_CTX_LIMIT_ENABLED=true
PROXY_CTX_CHARS_LIMIT=100000
PROXY_CTX_KEEP_HEAD=2
PROXY_CTX_KEEP_TAIL=6

# 上下文截断策略
PROXY_CTX_TRUNCATE_STRATEGY=rounds
PROXY_CTX_KEEP_ROUNDS=10
PROXY_CTX_TOKEN_BUDGET=40000

# 输出 token 限制
PROXY_MAX_TOKENS_OVERRIDE=16384
PROXY_OUTPUT_TOKEN_LIMIT_RATIO=2.0
PROXY_BACKEND_TIMEOUT=300

# 请求报文保存（调试用）
PROXY_SAVE_REQUESTS=true
PROXY_SAVE_REQUESTS_DIR=/tmp/anthropic_requests
PROXY_SAVE_REQUESTS_MAX=20

# 配置元数据
CONFIG_NAME="vllm-mlx + Qwen3.5-9B-MLX-4bit"
CONFIG_DESC="9B dense，Tool Clearing OFF，GPU利用率65%，TurboQuant移除，HF_HUB_OFFLINE"
CONFIG_MEMORY="~6-8 GB"
