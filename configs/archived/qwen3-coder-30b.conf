# ============================================================
# vllm-mlx + Qwen3-Coder-30B-A3B-4bit 配置
# 模型: mlx-community/Qwen3-Coder-30B-A3B-Instruct-4bit
# 用途: 代码生成与工具调用，MoE 架构 (30B 总参, 3B 激活)
# 特点: 非 reasoning 模型，TTFT 极快
#       MoE 仅 3B 激活，吞吐高 (~87 tok/s)
#       注意: MoE 架构的 prefix cache 在 v0.6.71 BatchedEngine 下不可用
# ============================================================

# ⚠️ 离线模式：vllm-mlx v0.6.71 启动必连 huggingface.co，网络不可用则卡死
export HF_HUB_OFFLINE=1

# 后端选择（vllm-mlx，v0.6.71 中与 rapid-mlx 同一二进制）
LLAMA_BACKEND=vllm-mlx

# 模型
LLAMA_MODEL="mlx-community/Qwen3-Coder-30B-A3B-Instruct-4bit"

# 网络
LLAMA_PORT=8081
LLAMA_HOST=127.0.0.1

# 线程
LLAMA_THREADS=8

# 采样参数
LLAMA_TEMP=0.5
LLAMA_TOP_P=0.9
LLAMA_TOP_K=20
LLAMA_PRESENCE_PENALTY=0.0
LLAMA_MIN_P=0.02

# Thinking mode（Coder 模型非 reasoning，关闭）
LLAMA_THINKING=false

# Rapid-MLX 特有参数
RAPID_MLX_TOOL_PARSER="qwen3_coder_xml"
RAPID_MLX_REASONING_PARSER=""
RAPID_MLX_ENABLE_PREFIX_CACHE=true
RAPID_MLX_KV_QUANTIZATION=false

# 额外启动参数
# --use-paged-cache: 启用 PagedCacheManager（块级 KV 缓存）
# --gpu-memory-utilization 0.80: 显存上限 80%，MoE 30B 模型内存安全
RAPID_MLX_EXTRA_ARGS="--use-paged-cache --gpu-memory-utilization 0.80"

# 代理并发控制（48GB 机器保守控制，避免并发 OOM）
# 原为 4，根据 rapid-mlx-9b 经验 running=2 时峰值 26.7GB → 降为 2
PROXY_MAX_CONCURRENT=2

# 代理上下文管理
# CLEAR_ENABLED=false: Tool Clearing 已废弃（AGENTS.md 警告），
#   由 Smart Truncate + 语义压缩替代
PROXY_CLEAR_ENABLED=false
PROXY_CLEAR_THRESHOLD=50000
PROXY_TOOL_KEEP=8
PROXY_CTX_LIMIT_ENABLED=true
PROXY_CTX_CHARS_LIMIT=120000
PROXY_CTX_KEEP_HEAD=6
PROXY_CTX_KEEP_TAIL=6

# Blocker 检测
PROXY_BLOCKER_ENABLED=true
PROXY_BLOCKER_THRESHOLD=2

# 上下文截断策略
PROXY_CTX_TRUNCATE_STRATEGY=rounds
PROXY_CTX_KEEP_ROUNDS=12

# 输出控制
PROXY_MAX_TOKENS_OVERRIDE=16384
PROXY_OUTPUT_TOKEN_LIMIT_RATIO=2.0
PROXY_BACKEND_TIMEOUT=300

# 循环检测
PROXY_LOOP_THRESHOLD=3

# 配置元数据
CONFIG_NAME="vllm-mlx + Qwen3-Coder-30B-A3B-4bit"
CONFIG_DESC="Coder MoE 30B，Tool Clearing OFF，GPU利用率80%，并发2，HF_HUB_OFFLINE"
CONFIG_MEMORY="~12-16 GB (模型 8.7GB + KV cache)"
