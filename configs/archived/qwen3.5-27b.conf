# ============================================================
# vllm-mlx + Qwen3.5-27B-4bit
# 模型: mlx-community/Qwen3.5-27B-4bit
# 用途: 3.5 代 dense 27B，非 MoE 非 hybrid
# 特点: 可能具有跨请求前缀缓存能力
# ============================================================

export HF_HUB_OFFLINE=1

LLAMA_BACKEND=rapid-mlx
LLAMA_MODEL="mlx-community/Qwen3.5-27B-4bit"
LLAMA_PORT=8081
LLAMA_HOST=127.0.0.1
LLAMA_THREADS=8

LLAMA_TEMP=0.6
LLAMA_TOP_P=0.95
LLAMA_TOP_K=20
LLAMA_PRESENCE_PENALTY=0.0
LLAMA_MIN_P=0.0
LLAMA_THINKING=false

RAPID_MLX_TOOL_PARSER="qwen3_coder_xml"
RAPID_MLX_REASONING_PARSER=""
RAPID_MLX_ENABLE_PREFIX_CACHE=true
RAPID_MLX_KV_QUANTIZATION=true
RAPID_MLX_KV_QUANT_BITS=4

RAPID_MLX_EXTRA_ARGS="--no-mllm --gpu-memory-utilization 0.70 --cache-memory-mb 4096 --max-num-seqs 1"

PROXY_MAX_CONCURRENT=1
PROXY_CLEAR_ENABLED=false
PROXY_TOOL_KEEP=8
PROXY_CTX_LIMIT_ENABLED=true
PROXY_CTX_CHARS_LIMIT=150000
PROXY_CTX_KEEP_HEAD=6
PROXY_CTX_KEEP_TAIL=6
PROXY_CTX_TRUNCATE_STRATEGY=rounds
PROXY_CTX_KEEP_ROUNDS=10
PROXY_MAX_TOKENS_OVERRIDE=16384
PROXY_BACKEND_TIMEOUT=300
PROXY_LOOP_THRESHOLD=3

CONFIG_NAME="vllm-mlx + Qwen3.5-27B-4bit"
CONFIG_DESC="Qwen3.5 27B dense，4-bit KV，可能支持前缀缓存"
CONFIG_MEMORY="~14-16 GB"
